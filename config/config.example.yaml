# =============================================================================
# high_priority_rare_variant — EXAMPLE configuration
#
# Copy to config/config.yaml (git-ignored) and fill in the ${...} placeholders.
# Default values match docs/README.md#canonical-defaults. Keys marked "[reserved]"
# specify the TARGET methodology (finer ACMG tiers, overlays, phenotype priors) and
# are NOT yet consumed by the current screening/inheritance/recurrence code — they are
# documented here so the intended full method is visible; do not assume they change
# behavior until wired. See docs/README.md and CLAUDE.md "Open TODOs".
#
# PUBLIC-REPO RULE: this example contains NO real paths and NO identifiers. All
# filesystem locations are ${ENV_VAR} placeholders resolved at runtime, so nothing
# machine- or subject-specific is ever committed. Keep it that way in config.yaml
# too (prefer env vars over literal paths), and never commit config.yaml or data.
# =============================================================================

project:
  name: hprv_screen
  genome_build: GRCh38            # this pipeline is GRCh38-only
  output_dir: ${HPRV_WORK}        # run outputs (git-ignored); e.g. a scratch dir

runtime:
  image: ${HPRV_IMAGE}            # e.g. ghcr.io/<owner>/high_priority_rare_variant@sha256:...
  engine: auto                    # auto | apptainer | singularity | docker | native
  tmpdir: ${HPRV_TMPDIR}          # MUST be real disk, not tmpfs (avoids --containall OOM)
  # SIZE THIS TO YOUR ALLOCATION — the default of 4 is a laptop default, not an HPC one.
  # Step 2 passes it to `vep --fork`, and Step 2 is by far the dominant cost of the whole run,
  # so on a 32-core node this is the single highest-leverage number in the file.
  # What it does NOT do: bcftools `--threads` only adds BGZF (de)compression workers. The actual
  # work in `norm` — reference lookups and left-alignment — is single-threaded whatever you set,
  # so raising this will not speed up Steps 1/4. Those are per-trio and currently run serially;
  # see docs/limitations.md if you are running WGS across many trios.
  threads: 4

reference:
  fasta: ${REF_FASTA}             # the exact GRCh38 FASTA the trios were called against
  # .fai is expected alongside (samtools faidx)

# --- External, version-pinned, bind-mounted resources (never baked into the image) ---
# Provide the ones you have; steps that need a missing resource fail loudly with a
# clear message rather than silently skipping annotation.
# VEP-ONLY CONTRACT. The annotation surface is a VEP 115 GRCh38 cache + the CADD plugin —
# nothing else is downloaded or bind-mounted. Population frequency (gnomAD v4.1 per-population
# AFs) and ClinVar (CLIN_SIG) come out of the cache itself via --af_gnomade/--af_gnomadg and
# --check_existing. What that costs, in one place (details in docs/allele_frequency.md):
#   * no faf95        — the cache has no AC/AN, so the 95% CI correction cannot be computed at
#                       any price. Rarity uses a grpmax-PROXY point estimate instead, which runs
#                       slightly stringent on low-count alleles (errs toward dropping).
#   * no nhomalt      — the gnomAD-homozygote sanity check on de novo calls is gone.
#   * no SpliceAI     — deep-intronic and exonic-synonymous splice variants are invisible to the
#                       screen. CADD is a lossy proxy (v1.6+ ingests SpliceAI as a feature).
#   * no LOFTEE       — no HC/LC pLoF confidence (was near-inert for selection; matters for tiering).
#   * no ClinVar stars— the >=2-star gate is unimplementable; unstarred P/LP is honored instead.
#   * no REVEL/AlphaMissense/MPC — these were already inert for selection (missense-only scores,
#                       and every missense is IMPACT=MODERATE, which is kept at an earlier branch).
resources:
  vep:
    cache_dir: ${VEP_CACHE}       # release-matched to the VEP binary in the image (115)
    version: 115
    plugins_dir: ${VEP_PLUGINS}   # plugin CODE — ships IN the image at /plugins; ${VEP_PLUGINS}
                                  # defaults to /plugins via the image ENV. Only CADD is used.
    # Already have a VEP VCF? Point this at it and Step 2 skips the VEP call entirely, using
    # your file as cohort.sites.annotated.vcf.gz. Must be VEP 115 GRCh38 and carry the CSQ
    # fields above (Step 2 verifies the build and fails loudly if frequencies are absent).
    annotated_vcf: ${VEP_ANNOTATED_VCF}
    # Which CSQ block split-vep lifts when a variant has several. Auto: "pick" (PICK=1) when the
    # VCF was made with --pick/--flag_pick, else "worst". Accepts: all|worst|primary|mane|pick|EXPR.
    # NB: a --pick_order starting with `rank` picks the WORST-consequence transcript, so SYMBOL
    # may name a non-MANE/readthrough gene that Step 6 then aggregates carriers under. Set this
    # to "mane" if consistent gene attribution matters more to you than recall.
    csq_select: ""
    cadd_snv: ${CADD_SNV}         # whole_genome_SNVs.tsv.gz (+ .tbi)
    cadd_indel: ${CADD_INDEL}     # gnomad indel CADD tsv.gz (+ .tbi)
    # Step 2 (the dominant cost) shards the VEP call BY CONTIG: each contig is an independent run
    # with its own .done, so a job killed at the scheduler walltime RESUMES on re-submit instead
    # of re-annotating from scratch — and the shards can be driven as a SLURM array (one contig
    # per task) for multi-node speedup. Output is byte-identical to a single pass (only the vep
    # call is sharded; split-vep and all guards run once on the reassembled whole). Set false only
    # if you have a reason to run one un-resumable pass. On WGS this is what makes Step 2 finish.
    # Tip: the CADD plugin's per-variant tabix reads into the ~81 GB file are the per-shard
    # bottleneck; if it lives on a network/FUSE mount, stage it to node-local disk first.
    shard_by_contig: true
  constraint:
    # One per-gene TSV with LOEUF (oe_lof_upper) / pLI / s_het / phaplo columns (any subset).
    gnomad_v2_constraint: ${GNOMAD_V2_CONSTRAINT}  # pLI/LOEUF/s_het/pHaplo per gene
  gene_lists:                     # [reserved] gene-list overlay not yet wired (planned)
    # All provided as simple gene-symbol lists / TSVs; version-pin and record below.
    acmg_sf: ${ACMG_SF_LIST}
    acmg_sf_version: "v3.3"
    panelapp_childhood_solid: ${PANELAPP_243}
    panelapp_adult_susceptibility: ${PANELAPP_245}
    panelapp_version: "REPLACE_WITH_PANEL_VERSION"
    recessive_cpg: ${RECESSIVE_CPG_LIST}           # MMR/FANC*/ATM/DIS3L2/BLM etc.
  mutation_rate_table: ${MUTRATE_TABLE}            # Samocha per-gene, per-consequence rates
  # Source CRAMs for the IGV review export (Step 8). TSV: sample<TAB>cram_path.
  # Mini-CRAMs are sliced around candidate loci for each trio member. Optional —
  # without it, variants.tsv is still produced (no alignment tracks). Paths may be
  # on a FUSE/network mount (slices are small index-based reads; concurrency is
  # capped by outputs.igv.extract_jobs so the mount stays healthy).
  cram_map: ${CRAM_MAP}
  # Reference the CRAMs were ENCODED against (used ONLY to decode CRAMs in Step 8).
  # CRAM is reference-compressed, so decoding requires the exact contigs/MD5s the
  # CRAM was written with — which may DIFFER from reference.fasta (the calling build)
  # when alignment and calling used different GRCh38 builds (decoy/HLA/PAR masking).
  # Leave unset to reuse reference.fasta.
  cram_ref: ${CRAM_REF}
  # Optional directory of verifyBamID *.selfSM files (Step 0 contamination gate). If set,
  # per-sample FREEMIX is ingested; otherwise Step 0 falls back to a VCF-only CHARR estimate.
  selfsm_dir: ${SELFSM_DIR}
  # kraken2 database DIRECTORY for Step-8b non-human-fraction (NHF) screening of ALT-supporting
  # reads (see outputs.igv.nonhuman_screen). DATA — bind-mounted, NEVER baked into the image (like
  # the VEP cache / CADD). Recommended: PrackenDB k2_NCBI_reference (k=35; ships the taxonomy dumps).
  # The dir MUST hold hash.k2d/opts.k2d/taxo.k2d AND taxonomy/nodes.dmp+names.dmp — without the
  # dumps kraken2 falls back to exact-taxid matching and the NHF signal is unreliable in BOTH
  # directions (Step 8b preflights the dumps and warns). Leave unset to disable NHF screening even
  # when nonhuman_screen.enabled is true (Step 8b warns and skips). See docs/resources.md.
  kraken2_db: ${KRAKEN2_DB}

inputs:
  # Trio pedigree (git-ignored, user-supplied): tab-separated with a HEADER naming the
  # kid/dad/mom columns (any order, alias-matched); values are sample IDs that match the
  # VCFs. Example:
  #     #kid   dad    mom
  #     CH1    FA1    MO1
  trios_file: ${TRIOS_FILE}
  # Where the VCFs live. Provide a directory (globbed recursively for *.vcf.gz/*.vcf/*.bcf)
  # and/or a file listing VCF paths (one per line). The resolver locates, for each trio,
  # the VCF containing ALL THREE members (matched exactly by sample ID; extra members are
  # fine) and auto-generates the internal manifest + PEDs. Set one or both.
  vcf_dir: ${VCF_DIR}
  vcf_list: ${VCF_LIST}

# --- Filtering thresholds (defaults = canonical; a ClinGen VCEP value overrides) ---
filters:
  rarity:
    # THE rarity field is a gnomAD v4.1 grpmax PROXY: max AF over the grpmax-eligible ancestry
    # groups (AFR/AMR/EAS/NFE/SAS) read from the VEP CSQ. Fixed in annotations.frequency() —
    # this block sets the cutoffs, not the field. Two things to hold onto:
    #  * It is a POINT ESTIMATE, not faf95. faf95 needs AC/AN; the cache has neither. So these
    #    gates sit ~one CI-width stringent on low-count alleles (they err toward dropping).
    #  * It deliberately EXCLUDES asj/fin/mid/ami/remaining, exactly as gnomAD's own grpmax does.
    #    VEP's MAX_AF does not, and using it here would let one allele in a ~900-AN founder group
    #    read as AF ~1e-3 and silently kill dominant candidates ten-fold under this cutoff.
    dominant_max: 1.0e-4          # dominant / de novo candidate
    recessive_max: 1.0e-2         # recessive / comp-het per-allele (permissive discovery)
    recessive_strict: 1.0e-3      # tags recessive/X-linked calls below this as high_conf_rarity
    benign_ba1: 0.05              # drop, never rescue (ClinGen BA1)

  functional:
    # Step-3 selection keeps a variant on EITHER: HIGH/MODERATE VEP impact, or CADD over its
    # cutoff. That is the whole ladder — see src/hprv/selection.py. The predictor stack this
    # used to carry (REVEL/AlphaMissense/MPC/SpliceAI/LOFTEE) is gone with its resource files.
    keep_impacts: [HIGH, MODERATE]
    # CADD is the ONLY functional predictor, and the ONLY keep-path for anything VEP rates below
    # MODERATE — so this one number IS the entire non-coding screen. Two honest caveats:
    #  1. PROVENANCE. 25.3 is Pejaver-2022's PP3-supporting cutoff, calibrated on MISSENSE ONLY.
    #     Missense never reaches this branch (it is MODERATE, kept above), so in practice 25.3 is
    #     applied exclusively to the non-coding variants it was NOT calibrated for. Treat it as a
    #     discovery rank (~top 0.3% genome-wide), not as ACMG PP3 evidence.
    #  2. There is no ClinGen-endorsed CADD threshold for non-coding variants to replace it with.
    #     Lowering it widens non-coding discovery at a steep cost in review volume (PHRED 20 =
    #     top 1%; 15 = top ~3%). Change it deliberately, not by taste.
    cadd_phred_supporting: 25.3

  clinvar:
    # NOTE: the >=2-star auto_promote_min_stars gate is RETIRED. It needed CLNREVSTAT, which the
    # VEP cache does not carry (it exposes CLIN_SIG only), so review status is simply unavailable
    # and a 1-star single-submitter P/LP is now indistinguishable from an expert-panel one. The
    # override therefore fires on ANY unstarred P/LP assertion — over-retention (more to review),
    # not over-dropping. ClinVar here is also as stale as the cache (VEP 115 = ClinVar 2025-02),
    # where a ClinVar VCF would have been monthly.
    promote_sigs: ["Pathogenic", "Likely_pathogenic", "Pathogenic/Likely_pathogenic"]  # [reserved]
    flag_sigs: ["Conflicting_classifications_of_pathogenicity", "Uncertain_significance"]  # [reserved]

  genotype_qc:                    # applied to the REFINED (PP-derived) genotypes
    min_gq: 20
    min_dp: 10
    denovo_min_dp: 20
    het_ab_min: 0.25
    het_ab_max: 0.75
    homalt_ab_min: 0.90
    homref_ab_max: 0.10
    require_pass: true

  denovo:
    # De novo detection is SECONDARY here (retained only for cross-reference).
    # Dedicated de novo filtering + review lives in separate bespoke machinery.
    use_hiconf_tag: true          # GATK hiConfDeNovo (child-membership checked)
    parent_max_alt_ad: 1          # parental "cleanliness"
    parent_min_dp: 10
    # (require_gnomad_absent_or_singleton removed: it was implemented as nhomalt > 1 — a
    #  HOMOZYGOTE-count test, never the allele-count test its name promised — and nhomalt does
    #  not exist in the VEP cache. The dominant_max rarity gate still applies to de novo calls.)
    crosscheck_prerefinement_pl: true   # guard the gnomAD-prior suppression failure mode

  constraint_weighting:           # RANKING WEIGHTS — never exclusion filters. A gene is
                                  # "constrained" (Step 6) if ANY of LOEUF_v2/pLI/s_het/pHaplo
                                  # crosses its cutoff (columns read from the constraint TSV).
    loeuf_v2_tier1: 0.35          # active
    loeuf_v4_tier1: 0.60          # [reserved] v4 LOEUF path not yet wired (v2 preferred)
    pli_min: 0.90                 # active
    shet_min: 0.10                # active (Zeng 2024 s_het, esp. for short genes)
    phaplo_min: 0.86              # active (Collins 2022 pHaplo)
    downweight_recessive_by_lof_constraint: false   # [reserved] per-model down-weighting not implemented

# --- Step 0 QC (contamination gate; Mendelian-error + sex are always computed) ---
qc:
  freemix_threshold: 0.05         # flag a trio if any member's verifyBamID FREEMIX exceeds this
  charr_threshold: 0.02           # VCF-only fallback: ref-read fraction at hom-alt SNV sites
  mie_max: 0.02                   # flag a trio if its genome-wide Mendelian-error rate exceeds this
  x_het_male_max: 0.10            # chrX non-PAR het-ratio below this -> inferred male
  sex_min_sites: 20               # need >= this many informative chrX calls to infer sex (else unknown)

# --- Inheritance modes (Step 5). Focus = INHERITED germline variation. ---
inheritance:
  emit_dominant: true             # rare functional INHERITED het (transmitted from >=1 parent);
                                  #   the recurrence signal Step 6 consolidates across individuals
  emit_denovo: true               # SECONDARY / cross-reference only (review handled elsewhere);
                                  #   set false to omit de novo rows entirely
  # (recessive: homozygous + compound-het-in-trans, and X-linked recessive, are always emitted)

# --- Cross-pedigree gene consolidation (Step 6): recurrence across individuals ---
# A gene is of interest when rare functional variants RECUR across independent individuals.
# DOMINANT model: multiple individuals each carrying a qualifying rare functional HET.
# RECESSIVE model: multiple individuals with a biallelic hit. Weighted by constraint
# (a recurrent het in a haploinsufficient gene is far more compelling).
burden:
  min_carriers: 2                 # a gene is "recurrent" at >= this many distinct individuals
  # Calibrated recurrence null: observed carriers (>= min_carriers) are tested against
  # Binomial(N_trios, p) with a MODEL-APPROPRIATE p over the gene's qualifying variants
  # (absent -> floor): dominant het p = 1 - prod_v (1-q_v)^2 (PRIMARY ranked signal);
  # biallelic p = (sum_v q_v)^2; X-linked-male p = 1 - prod_v (1-q_v). Yields
  # p_recurrence (+ per-mode p) + BH q + exome-wide flag.
  # q_v is the grpmax-proxy AF (annotations.frequency()). It reads slightly HIGH vs faf95 on
  # low-count alleles, which inflates the null and makes these p-values conservative — the
  # right direction for a discovery claim.
  absent_af_floor: 1.0e-6         # gnomAD detection-limit floor for variants absent from gnomAD
  weight_by_constraint: true      # rank recurrent+constrained genes highest
  # OPTIONAL secondary signals (reported, not the primary rank):
  denovo_enrichment: true         # Samocha per-gene Poisson if a mutation_rate_table is given
  corroborative_trapd: false      # [reserved] TRAPD vs matched gnomAD not yet implemented
  exome_wide_p: 2.5e-6            # exome-wide threshold for the recurrence AND de novo p-values
  fdr_q: 0.05

# --- [reserved] Pediatric-cancer overlay & phenotype priors — NOT yet wired.
#     These specify the planned overlay/phenotype layer (see CLAUDE.md Open TODOs);
#     no code reads them today. ---
overlays:
  pediatric_cancer:
    enabled: true
    dominant_report_het_plp: true
    recessive_require_biallelic: true
    second_hit_tier_boost: true            # LOH / DICER1 hotspot boosts, never required
    flag_pseudogene_regions: true          # PMS2/PMS2CL, CYP21A2, SMN1/2, NEB, GBA
  phenotype:
    enabled: false                          # requires per-proband HPO terms
    hpo_terms_tsv: ${HPO_TERMS}             # trio_id -> HPO term list; degrade gracefully if absent
    ranker: exomiser                        # ranking PRIOR only (never-drop rule)

# --- Outputs (Steps 7-8) ---
outputs:
  xlsx: true                      # consolidated .xlsx supplemental-table summary (Step 7)
  igv:
    enabled: true                 # igv.js trio variant-review export (Step 8)
    padding: 1000                 # bp flank around each candidate locus for mini-CRAM slicing
    genome: hg38                  # reference name passed to the igv.js server
    extract_jobs: 4               # samtools --threads (-@) per CRAM slice in Step 8 (defaults to
                                  #   runtime.threads). Slices run SERIALLY — one source CRAM open at
                                  #   a time — which is the gentlest access pattern for a flaky
                                  #   FUSE/SBFS mount; this only sets the per-slice compression threads.
                                  #   Run Step 8 in one interactive job where the CRAM mount is available.
    # --- Step 8b: non-human-fraction (NHF) annotation of candidate calls ---------------------
    # For each candidate, classify the ALT-supporting reads (in the already-sliced mini-CRAMs) with
    # kraken2 and record the fraction that are NON-human — a contamination / mis-mapping signal a
    # curator uses to DOWN-RANK a call (e.g. a "variant" whose ALT reads are bacterial). Rides
    # entirely on Step 8's existing mini-CRAMs + per-trio VCFs; adds no new CRAM I/O.
    nonhuman_screen:
      enabled: true               # ON by default. ACTIVATES only when resources.kraken2_db is set
                                  #   AND mini-CRAMs exist (needs resources.cram_map); otherwise Step
                                  #   8b warns and skips, leaving the NHF columns blank. So "on" is
                                  #   safe to leave even on runs with no kraken2 DB.
      members: carriers           # which trio members to screen per candidate:
                                  #   carriers (default) = the child always + a parent only where it
                                  #     carries the ALT (distinguishes sample-specific contamination
                                  #     from a locus that mis-maps in everyone); child_only = just the
                                  #     proband (cheapest — the candidate is defined by the child);
                                  #     all = every member with a mini-CRAM.
      confidence: 0.05            # kraken2 LCA confidence (raised off kraken2's 0.0 default so a
                                  #   single stray k-mer cannot call a read non-human — critical when
                                  #   an inherited het may have only a handful of ALT reads).
      min_reads: 5                # denominator floor for the derived nhf_flag: an NHF over fewer than
                                  #   this many ALT reads is too noisy to flag (the raw *_nhf_reads
                                  #   count is ALWAYS emitted beside each *_nhf so the reviewer sees it).
      memory_mapping: true        # mmap the kraken2 DB instead of loading it into private RAM. Keeps
                                  #   RAM low AND — because invocations run sequentially on a node —
                                  #   lets the OS page cache stay warm across trios, collapsing the
                                  #   per-invocation DB-load cost. Put the DB on LOCAL disk/NVMe, not
                                  #   a FUSE mount, for this to pay off. See docs/resources.md.

# --- Honest scope limitations (documented, enforced as warnings) ---
scope:
  snv_indel_only: true            # CNV/SV not detected here — a known blind spot
  warn_on_low_confidence_regions: true
