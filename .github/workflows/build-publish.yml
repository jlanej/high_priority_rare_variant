name: build-publish

# Build the analysis image on every commit and publish it to GHCR.
# Layer caching (type=gha) keeps docs-only commits cheap: unchanged layers are
# reused, so only the final tag/push runs. Downstream (HPC/Apptainer) should pull
# the image BY DIGEST, which this workflow records via build provenance.

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write        # push to GHCR
  id-token: write        # OIDC for SLSA provenance attestation
  attestations: write    # attach build provenance to the image

jobs:
  lint:
    # Gates publishing (see build-publish's `needs`). Kept to `severity: error` /
    # `failure-threshold: error` so style nits don't block a release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck pipeline scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./pipeline
          severity: error
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  test:
    # Fast, host-only pure-logic tests (no container). Gates publishing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pure-logic tests
        run: python tests/test_pure.py

      # The image bakes in resources/manifest.env, and prepare_resources.sh reads it by a path
      # relative to itself. .gitignore's `resources/` rule silently swallowed the manifest for
      # most of this repo's life (fixed in e2c09f0): it existed on every dev box, so nothing
      # noticed, while a clean clone — and therefore the image — had no manifest at all. These
      # two steps run on a clean checkout, which is exactly the condition that catches it.
      - name: Pinned manifest is tracked and not ignored
        run: |
          git ls-files --error-unmatch resources/manifest.env
          if git check-ignore -q resources/manifest.env; then
            echo "FATAL: resources/manifest.env matches a .gitignore rule — 'git add' will" \
                 "silently drop edits to it. Keep the 'resources/* + !resources/manifest.env'" \
                 "exception intact." >&2
            exit 1
          fi
          echo "OK: resources/manifest.env is tracked and not ignored"

      - name: prepare_resources.sh resolves its manifest from a clean clone
        run: |
          # emit-env, NOT verify: verify legitimately exits 1 here (a clean clone has no prepared
          # resources). emit-env exits 0 iff the manifest was found and sourced, which is the one
          # thing under test — and it needs no bio tools, so it runs in this host-only job.
          out="$(bash scripts/prepare_resources.sh --dir "$(mktemp -d)" emit-env)"
          echo "$out"
          echo "$out" | grep -q '^export GNOMAD_SITES=.*gnomad.joint.v4.1' \
            || { echo "FATAL: emit-env produced no manifest-derived exports" >&2; exit 1; }

  integration:
    # End-to-end pipeline over generated mock data with REAL bcftools + the python
    # steps. Only Step 2's VEP invocation is mocked (cache too heavy for CI), so no
    # image build is needed. Gates publishing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install bcftools / samtools / bedtools / htslib
        run: sudo apt-get update && sudo apt-get install -y bcftools samtools bedtools tabix
      - name: Install python deps
        run: pip install cyvcf2 pysam numpy scipy pyyaml openpyxl
      - name: Run integration test
        run: bash tests/integration/run_integration.sh

  build-publish:
    runs-on: ubuntu-latest
    # Gate publishing on the checks: a test-failing (but image-valid) regression must NOT ship to
    # GHCR:latest where HPC users pull it. lint/test/integration must pass before build+push.
    needs: [lint, test, integration]
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build the image locally FIRST so we can smoke-test the real (non-mocked) VEP before
      # publishing. The integration job mocks VEP (cache is too heavy for CI), so this is the
      # only place the image's actual VEP + plugin Perl stack is exercised. Layers are gha-cached
      # and reused by the push step below (near-instant), so this does not double the build cost.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: hprv:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Non-mocked smoke test: VEP must actually start (loads its Perl modules under the image's
      # env — catches the conda-Perl-shadow class of bug the mocked integration test cannot), and
      # LOFTEE's Perl deps + all four plugin .pm must be present in VEP's Perl. Any failure here
      # fails the job before the push below, so a broken image is never published.
      # This runs as the image's unprivileged runtime user, so it also proves the baked
      # prepare_resources.sh is reachable and executable the way a user actually invokes it —
      # the Dockerfile's own probe runs as root and cannot show that.
      - name: Smoke test — real VEP + LOFTEE Perl deps + plugin code + resource prep
        run: |
          docker run --rm hprv:ci bash -c '
            set -eu
            echo "vep interpreter: $(head -1 "$(command -v vep)")"
            vep --help >/dev/null && echo "OK: vep --help (VEP + its Perl modules load)"
            for m in DBI DBD::SQLite Bio::DB::BigFile Bio::Perl Bio::DB::HTS; do
              perl -M"$m" -e1 && echo "OK: perl module $m"
            done
            for p in LoF CADD dbNSFP SpliceAI; do
              test -f "/plugins/$p.pm" && echo "OK: plugin /plugins/$p.pm"
            done
            command -v prepare_resources.sh >/dev/null && echo "OK: prepare_resources.sh on PATH"
            prepare_resources.sh --dir /tmp/_probe emit-env | grep -q "^export GNOMAD_SITES=" \
              && echo "OK: in-image pinned manifest resolves (no host checkout needed)"
          '

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64          # HPC is amd64; slivar/VEP ARM support is uneven
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Attest build provenance (SLSA)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### Published image";
            echo '```';
            echo "${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}";
            echo '```';
            echo "Pull on HPC with:";
            echo '```';
            echo "apptainer pull docker://${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
