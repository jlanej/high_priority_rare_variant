name: build-publish

# Build the analysis image on every commit and publish it to GHCR.
# Layer caching (type=gha) keeps docs-only commits cheap: unchanged layers are
# reused, so only the final tag/push runs. Downstream (HPC/Apptainer) should pull
# the image BY DIGEST, which this workflow records via build provenance.

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write        # push to GHCR
  id-token: write        # OIDC for SLSA provenance attestation
  attestations: write    # attach build provenance to the image

jobs:
  lint:
    # Gates publishing (see build-publish's `needs`). Kept to `severity: error` /
    # `failure-threshold: error` so style nits don't block a release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck pipeline scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./pipeline
          severity: error
      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  test:
    # Fast, host-only pure-logic tests (no container). Gates publishing.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pure-logic tests
        run: python tests/test_pure.py

      # SLURM `plan` self-resubmit path (pure bash, no scheduler needed). Guards the
      # sbatch-spool-copy gotcha: under sbatch, BASH_SOURCE points at the job spool dir, so the
      # graph must re-submit by the shared-storage path carried through slurm_run.env, not $HERE.
      - name: SLURM plan-resubmit regression test
        run: bash tests/slurm/test_plan_resubmit_path.sh

      # The image bakes in resources/manifest.env, and prepare_resources.sh reads it by a path
      # relative to itself. .gitignore's `resources/` rule silently swallowed the manifest for
      # most of this repo's life (fixed in e2c09f0): it existed on every dev box, so nothing
      # noticed, while a clean clone — and therefore the image — had no manifest at all. These
      # two steps run on a clean checkout, which is exactly the condition that catches it.
      - name: Pinned manifest is tracked and not ignored
        run: |
          git ls-files --error-unmatch resources/manifest.env
          if git check-ignore -q resources/manifest.env; then
            echo "FATAL: resources/manifest.env matches a .gitignore rule — 'git add' will" \
                 "silently drop edits to it. Keep the 'resources/* + !resources/manifest.env'" \
                 "exception intact." >&2
            exit 1
          fi
          echo "OK: resources/manifest.env is tracked and not ignored"

      - name: prepare_resources.sh resolves its manifest from a clean clone, and needs it
        run: |
          d="$(mktemp -d)"
          # emit-env, NOT verify: verify legitimately exits 1 here (a clean clone has nothing
          # prepared). emit-env needs no bio tools, so it runs in this host-only job.
          #
          # (1) it must resolve the tracked manifest and emit the ${ENV} placeholders the config
          #     expects. Asserting the *variable names* rather than a value: under the VEP-only
          #     contract every emitted path is "$DIR/<fixed basename>", so no emitted value is
          #     manifest-derived any more and there is nothing value-shaped left to match on.
          #     (An earlier version of this guard grepped for a gnomAD path and silently became a
          #     test of a deleted export.)
          out="$(bash scripts/prepare_resources.sh --dir "$d" emit-env)" \
            || { echo "FATAL: emit-env failed on a clean clone — the pinned manifest did not resolve" >&2; exit 1; }
          echo "$out"
          for v in REF_FASTA VEP_CACHE CADD_SNV CADD_INDEL; do
            echo "$out" | grep -q "^export $v=" \
              || { echo "FATAL: emit-env did not export $v — the config's \${$v} placeholder would never resolve" >&2; exit 1; }
          done
          # (2) ...and a manifest that is absent must FAIL, not be shrugged off. Step (1) is what
          #     actually catches the historical regression (verified: delete resources/manifest.env
          #     and (1) goes red); this adds cover for the HPRV_RESOURCE_MANIFEST override path.
          #     Deliberately a weak-but-cheap assertion — it proves a bogus path is fatal, not that
          #     the manifest's *contents* are consumed, so don't read more into a green here.
          if HPRV_RESOURCE_MANIFEST=/nonexistent/manifest.env \
               bash scripts/prepare_resources.sh --dir "$d" emit-env >/dev/null 2>&1; then
            echo "FATAL: emit-env SUCCEEDED with a missing manifest — a clean clone (or the image) could then ship without one and fail later, elsewhere" >&2
            exit 1
          fi
          echo "OK: manifest resolves from a clean clone, and its absence is fatal"

  integration:
    # End-to-end pipeline over generated mock data with REAL bcftools + the python
    # steps. Only the `vep` binary is mocked (its cache is 24 GB); Step 2 itself runs.
    # Gates publishing.
    #
    # bcftools comes from bioconda at the SAME PIN as env/environment.yml, read from that
    # file rather than duplicated here. `apt-get install bcftools` used to be good enough and
    # is not: Ubuntu ships an older bcftools than the image, so CI silently validated a
    # different tool than production. That is how `+split-vep -s pick` (needs a recent
    # bcftools) passed locally and died in CI. Test what you ship.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Resolve the pinned bcftools/samtools versions from env/environment.yml
        id: pins
        run: |
          # Single source of truth: if environment.yml moves, CI moves with it.
          bcf="$(sed -nE 's/^[[:space:]]*-[[:space:]]*bcftools[[:space:]]*=[[:space:]]*([0-9.]+).*/\1/p' env/environment.yml | head -1)"
          sam="$(sed -nE 's/^[[:space:]]*-[[:space:]]*samtools[[:space:]]*=[[:space:]]*([0-9.]+).*/\1/p' env/environment.yml | head -1)"
          [ -n "$bcf" ] && [ -n "$sam" ] || { echo "FATAL: could not parse the bcftools/samtools pins out of env/environment.yml — CI would silently test a different version than the image ships" >&2; exit 1; }
          echo "bcftools=$bcf" >> "$GITHUB_OUTPUT"
          echo "samtools=$sam" >> "$GITHUB_OUTPUT"
          echo "pinned: bcftools=$bcf samtools=$sam"
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: hprv-ci
          condarc: |
            channels: [conda-forge, bioconda]
          create-args: >-
            python=3.11
            bcftools=${{ steps.pins.outputs.bcftools }}
            samtools=${{ steps.pins.outputs.samtools }}
            bedtools
            htslib
      - name: Install python deps
        shell: micromamba-shell {0}
        run: pip install cyvcf2 pysam numpy scipy pyyaml openpyxl
      - name: Assert CI's bcftools matches the image's pin
        shell: micromamba-shell {0}
        run: |
          got="$(bcftools --version | head -1 | awk '{print $2}')"
          want="${{ steps.pins.outputs.bcftools }}"
          echo "bcftools: got=$got want=$want"
          case "$got" in "$want"*) ;; *) echo "FATAL: CI bcftools $got != pinned $want" >&2; exit 1;; esac
          # Step 2's default selector is `-s pick`, which +split-vep gained in bcftools 1.20.
          # Assert it here so a pin that drifts below 1.20 fails loudly rather than making the
          # integration test skip the code path production actually takes.
          maj="${got%%.*}"; rest="${got#*.}"; min="${rest%%.*}"
          if [ "$maj" -lt 1 ] || { [ "$maj" -eq 1 ] && [ "$min" -lt 20 ]; }; then
            echo "FATAL: bcftools $got predates the split-vep 'pick' selector (added in 1.20) — CI would not be testing what the image runs" >&2; exit 1
          fi
          echo "OK: bcftools $got >= 1.20, so split-vep supports -s pick"
      - name: Run integration test
        shell: micromamba-shell {0}
        run: bash tests/integration/run_integration.sh

      # Step-8b `members: carriers` regression: runs the REAL 08_igv_export.sh with a stubbed
      # nonhuman-screen over BASE-FORM genotypes (as Step 5 emits), asserting a carrier parent is
      # NHF-screened and a non-carrier is not. Guards the awk that once tested base GTs for a digit
      # that cannot appear (silently degrading `carriers` to `child_only`). Needs the bio stack.
      - name: Step-8b carrier-policy regression test
        shell: micromamba-shell {0}
        run: bash tests/test_nhf_carriers.sh

      # Step-8 mini-CRAM slicing idempotency: runs the REAL 08_igv_export.sh twice and asserts a
      # valid prior slice is reused WITHOUT re-reading the source CRAM (byte-identical after a
      # corrupted source), a changed candidate set re-slices, and a corrupt mini-CRAM regenerates.
      # Guards the resumable-slicing contract that matters on a flaky FUSE/SBFS mount.
      - name: Step-8 mini-CRAM idempotency regression test
        shell: micromamba-shell {0}
        run: bash tests/test_step8_idempotent.sh

  build-publish:
    runs-on: ubuntu-latest
    # Gate publishing on the checks: a test-failing (but image-valid) regression must NOT ship to
    # GHCR:latest where HPC users pull it. lint/test/integration must pass before build+push.
    needs: [lint, test, integration]
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build the image locally FIRST so we can smoke-test the real (non-mocked) VEP before
      # publishing. The integration job mocks VEP (cache is too heavy for CI), so this is the
      # only place the image's actual VEP + plugin Perl stack is exercised. Layers are gha-cached
      # and reused by the push step below (near-instant), so this does not double the build cost.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: hprv:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Non-mocked smoke test: VEP must actually start (loads its Perl modules under the image's
      # env — catches the conda-Perl-shadow class of bug the mocked integration test cannot), and
      # LOFTEE's Perl deps + the plugin .pm must be present in VEP's Perl. Any failure here fails
      # the job before the push below, so a broken image is never published.
      # This runs as the image's unprivileged runtime user, so it also proves the baked
      # prepare_resources.sh is reachable and executable the way a user actually invokes it —
      # the Dockerfile's own probe runs as root and cannot show that.
      # NB: only CADD is invoked under the VEP-only contract; LoF/dbNSFP/SpliceAI are checked
      # because their CODE still ships (re-enabling them is config, not a rebuild) — see
      # docs/ROADMAP.md's restoration table. Their DATA is not fetched and they are not run.
      - name: Smoke test — real VEP + plugin code + Perl deps + resource prep
        run: |
          docker run --rm hprv:ci bash -c '
            set -eu
            echo "vep interpreter: $(head -1 "$(command -v vep)")"
            vep --help >/dev/null && echo "OK: vep --help (VEP + its Perl modules load)"
            for m in DBI DBD::SQLite Bio::DB::BigFile Bio::Perl Bio::DB::HTS; do
              perl -M"$m" -e1 && echo "OK: perl module $m"
            done
            for p in LoF CADD dbNSFP SpliceAI; do
              test -f "/plugins/$p.pm" && echo "OK: plugin code /plugins/$p.pm"
            done
            # split-vep must offer the `pick` selector Step 2 defaults to (bcftools >= 1.20),
            # in the image itself — the integration job asserts this against its own bcftools,
            # which is a different install.
            bcftools --version | head -1
            command -v prepare_resources.sh >/dev/null && echo "OK: prepare_resources.sh on PATH"
            # The in-image manifest must resolve. Assert on an export that still EXISTS under the
            # VEP-only contract: this previously grepped GNOMAD_SITES and became a test of a
            # deleted export the moment the gnomAD transfer was removed.
            prepare_resources.sh --dir /tmp/_probe emit-env | grep -q "^export VEP_CACHE=" \
              && echo "OK: in-image pinned manifest resolves (no host checkout needed)"
          '

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64          # HPC is amd64; slivar/VEP ARM support is uneven
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Attest build provenance (SLSA)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "### Published image";
            echo '```';
            echo "${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}";
            echo '```';
            echo "Pull on HPC with:";
            echo '```';
            echo "apptainer pull docker://${{ env.REGISTRY }}/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
